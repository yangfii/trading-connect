services:
  - type: web
    name: trading-connect
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --threads 8 --timeout 0 dashboard_server:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: AUTH_TOKEN
        generateValue: true
